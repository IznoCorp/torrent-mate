board:
  intro_title: Tableau
  revision_label: "rév."
  revision_hint: Révision du tableau — incrémentée à chaque changement ; sert à détecter les modifications concurrentes (verrouillage optimiste).
  open_monitoring: Voir dans le monitoring
  intro_body: >-
    Tableau kanban natif de ce projet. Déplacer une carte ici fait autorité sur le placement — ça
    pilote le board GitHub Projects via le miroir, et le workflow de transition autonome continue de
    se déclencher sur la colonne. Glisse les cartes sur desktop ; touche « Déplacer » sur mobile.
  not_native_title: Board natif non activé
  not_native_body: >-
    Ce board utilise encore le backend GitHub. Active le backend natif pour ce projet
    (board_backend = native) dans la page Projets, puis lance Import pour l'amorcer.
  mirror_degraded: Miroir GitHub échoué — natif enregistré
  identity_degraded: GitHub injoignable — titres indisponibles
  refresh: Rafraîchir
  import: Importer depuis GitHub
  import_confirm: Confirmer l'import ?
  action_failed: Action échouée
  move: Déplacer
  move_to: Déplacer vers la colonne
