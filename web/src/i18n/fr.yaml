term_help:
  title: Clavier & fonctionnement
  intro: >-
    Ceci est le terminal en direct de l'agent, en lecture seule par défaut. Prenez le contrôle pour
    envoyer vos frappes directement à l'agent ; la bordure rouge indique que vous avez le contrôle.
    Sur mobile, « Prendre le contrôle » ouvre le clavier. Cliquez d'abord sur le terminal pour lui
    donner le focus, puis utilisez les raccourcis ci-dessous. Si un menu interactif (/model, /effort…)
    brouille l'affichage, appuyez sur ⟳ Rafraîchir, ou tapez /clear dans l'agent.
  toggle_control: Prendre / rendre le contrôle — commencer ou cesser de taper vers l'agent
  toggle_fullscreen: Entrer / quitter le plein écran
  enter: Envoie un retour à la ligne (uniquement avec le contrôle)
  esc: Envoie Échap (uniquement avec le contrôle)
  ctrlc: Interrompt la commande en cours (uniquement avec le contrôle)

