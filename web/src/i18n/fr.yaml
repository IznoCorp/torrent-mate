  placeholder: Pas de prompt — transition script-only / no-op. Markdown supporté.
  no_prompt_md: "*Pas de prompt.*"
  unknown_count: "{n} placeholder(s) inconnu(s)"
  did_you_mean: " — vouliez-vous dire {{{name}}} ?"
  not_known: " n'est pas un placeholder connu."
  click_to_edit: Cliquer pour éditer le prompt complet

