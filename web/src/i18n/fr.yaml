  no_cards: Aucune carte
  conflict: Board modifié — rafraîchi
  moved_synced: Carte déplacée et synchronisée sur GitHub ✓
  moved_local: Carte déplacée ✓
  moved_unconfirmed: Déplacée localement — synchro GitHub non confirmée (Rafraîchir)
  moved_failed: Déplacée localement — échec de la synchro GitHub
  reordered: Ordre mis à jour ✓
  imported: "{n} carte(s) importée(s) depuis GitHub ✓"
