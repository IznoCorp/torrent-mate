  board_import: Réimporte le placement des cartes depuis GitHub (écrase l'ordre local)
  save: Enregistre vos modifications de configuration
  save_blocked: Corrigez les erreurs de validation avant d'enregistrer
  validate: Vérifie les erreurs de la configuration
