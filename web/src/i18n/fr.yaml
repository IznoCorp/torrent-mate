admin:
  intro_title: Admin / Ops
  intro_body: >-
    Tableau de bord santé et contrôle des daemons, à l'échelle de l'hôte. Vivacité du daemon par
    projet, joignabilité GitHub/tableau et présence du token, version installée vs disponible,
    indicateurs globaux (coupe-circuit / secret de session / agents en attente), et le journal des
    jobs récents — plus démarrage/arrêt/redémarrage des daemons PM2, consultation des logs, et le
    coupe-circuit PAUSE.
  section_health: Santé des projets
  section_jobs: Jobs récents
  no_projects: Aucun projet enregistré.
  no_jobs: Aucun job enregistré pour l'instant.
  flag_active: actif (non suspendu)
  flag_paused: SUSPENDU (coupe-circuit)
  flag_secret_pinned: secret de session épinglé
  flag_secret_random: secret de session non épinglé
  flag_agents_waiting: "{n} agent(s) en attente"
  version_offline: vérification version hors ligne
  version_update: "mise à jour disponible → {remote}"
  version_uptodate: à jour
  chip_daemon_up: daemon actif
  chip_daemon_down: daemon arrêté
  chip_github: github
  chip_board: tableau
  chip_token: token
  heartbeat_age: "heartbeat : il y a {age}"
  exit_code: "sortie {code}"
  # --- contrôle des daemons + PAUSE + logs (bosun phase 2) ---
  section_pause: Coupe-circuit
  section_daemon: Daemons
  no_daemons: Aucun daemon signalé.
  pause_help: >-
    Le coupe-circuit PAUSE global stoppe tous les lancements d'agents et rétrograde les agents en
    cours au niveau de permissions minimal. Le daemon le prend en compte au tick suivant.
  pause_activate: Activer PAUSE
  pause_resume: Reprendre
  daemon_meta: "pid {pid} · actif {uptime} · ↻{restarts}"
  daemon_start: Démarrer
  daemon_stop: Arrêter
  daemon_restart: Redémarrer
  daemon_logs: Logs
  daemon_logs_hide: Masquer les logs
  daemon_logs_empty: (aucune ligne de log)
  daemon_logs_failed: Impossible de charger les logs
  daemon_uiapp_tip: App UI — relancée uniquement via un redéploiement, pas en action isolée.
  daemon_already_running: Déjà en cours d'exécution.
  daemon_not_running: À l'arrêt.
  daemon_graceful_restart: Redémarrer (gracieux)
  daemon_graceful_restart_tip: Redémarre ce serveur UI — la page se déconnecte brièvement puis se reconnecte automatiquement.
  ctl_notice_title: Contrôle du daemon
  ctl_job_ok: "{app} : action terminée."
  ctl_job_failed: "{app} : action échouée (sortie {code})."
  ctl_job_timeout: "{app} : action toujours en cours — voir le journal des jobs."
  confirm_restart_title: Redémarrer le daemon ?
  confirm_restart_body: "Redémarrer {app} ? Les agents en cours sur ce daemon sont interrompus pendant le redémarrage."
  confirm_restart_apply: Redémarrer
  confirm_pause_title: Activer le coupe-circuit ?
  confirm_pause_body: >-
    Activer PAUSE stoppe tous les lancements d'agents et rétrograde les agents en cours au niveau
    de permissions minimal jusqu'à la reprise.
  confirm_pause_apply: Activer PAUSE
  # --- redéploiement depuis main (bosun phase 3) ---
  section_redeploy: Redéploiement depuis main
  redeploy_help: >-
    Redéploie le clone prod ou staging depuis le dernier main via le script de déploiement audité. Le
    serveur de config redémarre en dernière étape : cette UI se déconnecte brièvement puis se
    reconnecte sur le nouveau build.
  redeploy_prod: Redéployer (prod)
  redeploy_staging: Redéployer (staging)
  redeploy_running: "Redéploiement de {target} — exécution du script…"
  redeploy_reconnecting: "Redéploiement de {target} — reconnexion…"
  redeploy_done: "Redéploiement de {target} terminé — nouveau build en ligne."
  redeploy_failed: "Échec du redéploiement de {target} — voir le log ci-dessous."
  redeploy_reconnect_slow: "Redéploiement NON CONFIRMÉ — le build servi n'a pas changé à temps. Vérifie le journal des jobs et la version servie avant de le considérer en ligne."
  confirm_redeploy_title: "Redéployer {target} depuis main ?"
  confirm_redeploy_body: >-
    Ceci redéploie le clone {target} depuis le dernier main et redémarre son serveur de config. L'UI
    se déconnectera brièvement, puis se reconnectera sur le nouveau build. Les agents en cours ne sont
    pas affectés.
  confirm_redeploy_apply: Redéployer
  # --- redémarrage gracieux d'une app UI ---
  ui_restart_running: "Redémarrage de {app}…"
  ui_restart_reconnecting: "Redémarrage de {app} — reconnexion…"
