  ui_restart_reconnect_slow: "Redémarrage NON CONFIRMÉ — {app} n'est pas revenu à temps. Vérifie le journal des jobs."
  confirm_ui_restart_title: "Redémarrer {app} ?"
  confirm_ui_restart_body: >-
    Ceci redémarre le serveur de config {app}. Cette page se déconnectera brièvement puis se
    reconnectera automatiquement. Les agents en cours ne sont pas affectés.
  confirm_ui_restart_apply: Redémarrer
  # --- onboarding de projet (bosun phase 4) ---
  section_onboard: Projets
  onboard_help: >-
    Enregistrer un nouveau projet sur ce daemon. Ajouter un clone local existant depuis un dossier
    sous les racines d'onboarding (~/dev, ~/deploy, ~/staging), ou cloner un dépôt GitHub par URL.
