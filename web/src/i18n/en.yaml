    This is the agent's live terminal, read-only by default. Take control to send your keystrokes
    straight to the agent; the red border means you are in control. On mobile, Take control opens
    the keyboard. Click the terminal first so it has focus, then use the shortcuts below.
  toggle_control: Take / release control — start or stop typing to the agent
  toggle_fullscreen: Enter / exit fullscreen
  enter: Send a newline (only while in control)
  esc: Send Escape (only while in control)
  ctrlc: Interrupt the running command (only while in control)

