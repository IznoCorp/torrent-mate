  section_pause: Kill-switch
  section_daemon: Daemons
  no_daemons: No daemons reported.
  pause_help: >-
    The global PAUSE kill-switch stops all agent launches and downgrades running agents to the
    minimal permission floor. The daemon picks it up on its next tick.
  pause_activate: Activate PAUSE
  pause_resume: Resume
  daemon_meta: "pid {pid} · up {uptime} · ↻{restarts}"
  daemon_start: Start
  daemon_stop: Stop
  daemon_restart: Restart
  daemon_logs: Logs
