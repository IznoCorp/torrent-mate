  daemon_already_running: Already running.
  daemon_not_running: Not running.
  daemon_graceful_restart: Graceful restart
  daemon_graceful_restart_tip: Restart this UI server — the page briefly disconnects, then reconnects automatically.
  ctl_notice_title: Daemon control
  ctl_job_ok: "{app}: action completed."
  ctl_job_failed: "{app}: action failed (exit {code})."
  ctl_job_timeout: "{app}: action still running — check the jobs ledger."
  confirm_restart_title: Restart daemon?
  confirm_restart_body: "Restart {app}? Running agents on this daemon are interrupted while it bounces."
  confirm_restart_apply: Restart
  confirm_pause_title: Activate the kill-switch?
  confirm_pause_body: >-
    Turning PAUSE on stops all agent launches and downgrades running agents to the minimal
    permission floor until you resume.
  confirm_pause_apply: Activate PAUSE
  # --- redeploy from main (bosun phase 3) ---
  section_redeploy: Redeploy from main
  redeploy_help: >-
    Redeploy the prod or staging clone from the latest main via the audited deploy script. The config
    server bounces as the last step, so this UI briefly disconnects then reconnects on the new build.
  redeploy_prod: Redeploy (prod)
  redeploy_staging: Redeploy (staging)
  redeploy_running: "Redeploying {target} — running deploy script…"
  redeploy_reconnecting: "Redeploying {target} — reconnecting…"
  redeploy_done: "{target} redeploy complete — new build live."
  redeploy_failed: "{target} redeploy failed — see the log below."
  redeploy_reconnect_slow: "Redeploy UNCONFIRMED — the served build did not change in time. Check the jobs ledger and the served version before assuming it is live."
  confirm_redeploy_title: "Redeploy {target} from main?"
  confirm_redeploy_body: >-
    This redeploys the {target} clone from the latest main and bounces its config server. The UI will
    briefly disconnect, then reconnect on the new build. Running agents are not affected.
  confirm_redeploy_apply: Redeploy
  # --- graceful UI-app restart ---
  ui_restart_running: "Restarting {app}…"
  ui_restart_reconnecting: "Restarting {app} — reconnecting…"
  ui_restart_done: "{app} restarted."
  ui_restart_failed: "{app} restart failed."
  ui_restart_reconnect_slow: "Restart UNCONFIRMED — {app} did not come back in time. Check the jobs ledger."
  confirm_ui_restart_title: "Restart {app}?"
  confirm_ui_restart_body: >-
    This restarts the {app} config server. This page will briefly disconnect, then reconnect
    automatically. Running agents are not affected.
  confirm_ui_restart_apply: Restart
  # --- project onboarding (bosun phase 4) ---
  section_onboard: Projects
  onboard_help: >-
    Register a new project on this daemon. Add an existing local clone from a folder under the
    onboarding roots (~/dev, ~/deploy, ~/staging), or clone a GitHub repo by URL. The daemon picks
    it up on its next tick. Remove deregisters a project (the clone is left on disk).
