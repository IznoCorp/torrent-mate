admin:
  intro_title: Admin / Ops
  intro_body: >-
    Host-wide health dashboard and daemon control. Per-project daemon liveness, GitHub/board
    reachability and token presence, the installed vs available version, the global kill-switch /
    session-secret / waiting-agents flags, and the recent jobs ledger — plus PM2 daemon
    start/stop/restart, log tails, and the PAUSE kill-switch.
  section_health: Project health
  section_jobs: Recent jobs
  no_projects: No projects registered.
  no_jobs: No jobs recorded yet.
  flag_active: not paused
  flag_paused: PAUSED (kill-switch)
  flag_secret_pinned: session secret pinned
  flag_secret_random: session secret not pinned
  flag_agents_waiting: "{n} agent(s) waiting"
