<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>KanbanMate — Configuration</title>
    <!-- PWA: installable on Android/iOS as a standalone app (KanbanMateUI). -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#2e9e57" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="KanbanMate" />
    <!-- On the staging host, swap ONLY the PWA icons to the amber-liseret variant BEFORE
         install/paint. The NAME stays "KanbanMate" everywhere (operator) — prod and staging are
         told apart by the logo alone. Mirrors StagingBanner's host detection. -->
    <script>
      (function () {
        try {
          var h = location.hostname || "";
          if (!/staging/i.test(h) && location.port !== "8797") return;
          var setHref = function (sel, href) {
            var el = document.querySelector(sel);
            if (el) el.setAttribute("href", href);
          };
          setHref('link[rel="manifest"]', "/manifest-staging.webmanifest");
          setHref(
            'link[rel="apple-touch-icon"]',
            "/apple-touch-icon-staging.png",
          );
          setHref('link[rel="icon"]', "/icon-staging.svg");
        } catch (e) {
          /* detection best-effort — prod identity stays as the default */
        }
      })();
    </script>
    <!-- Apply the theme before first paint (no flash). Mirrors web/src/useTheme.js:
         mode in {light,dark,system}, default system → resolve via prefers-color-scheme. -->
    <script>
      (function () {
        try {
          var m = localStorage.getItem("bridge.theme");
          if (m !== "light" && m !== "dark" && m !== "system") m = "system";
          var dark =
            m === "dark" ||
            (m === "system" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          var t = dark ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", t);
          document.documentElement.style.colorScheme = t;
        } catch (e) {
          /* storage unavailable — fall through to CSS default (light) */
        }
      })();
    </script>
    <link rel="stylesheet" href="./src/ds/styles.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
