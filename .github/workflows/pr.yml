# KanbanMate CI: lint + unit tests + module-size guard on every PR and feature push.
#
# The full local gate (`make check` = ruff + mypy + pytest + size guard) runs here unchanged, so
# CI green means the same bar a developer clears locally. No real tmux/git/network is needed: the
# unit tests mock every adapter, and the `local_real` + `integration` markers are skipped by
# default (pytest runs `-m "not integration"`; `local_real` tests skip themselves when the tooling
# is absent).
name: pr

on:
  pull_request:
    branches: [main]
  push:
    branches: [feat/genesis]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with dev + ui extras
        # The ui extra (fastapi/uvicorn) is required so mypy can typecheck the
        # http/ config API and so the tests/http suite runs for real instead of
        # being skipped by its pytest.importorskip("fastapi") guard.
        run: pip install -e ".[dev,ui]"

      - name: Run full local gate (lint + test + size)
        run: make check

      - name: Import smoke check
        run: python -c "import kanbanmate"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate plugin marketplace manifest
        run: claude plugin validate . --strict

      - name: Validate plugin manifest
        run: claude plugin validate ./plugin --strict
