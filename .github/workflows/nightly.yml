# KanbanMate nightly integration CI — exercises the real GitHub Projects v2 board
# against a dedicated test org (DESIGN §7 H7, plan §4.3).
#
# Runs on a cron schedule (03:00 UTC) and can be dispatched manually from the
# Actions tab. Secrets are configured in the repository settings:
#   KANBAN_TOKEN             — GitHub PAT scoped project + repo
#   KANBAN_TEST_PROJECT      — ProjectV2 node id of the test board
#   KANBAN_TEST_REPO         — owner/name slug of the test repository
#   KANBAN_TEST_CARD_ITEM_ID — ProjectV2Item node id of a card to move
#   KANBAN_TEST_INERT_COLUMN — name of an inert Status column on the test board

name: nightly-integration

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest -m integration tests/integration/ -v
        env:
          KANBAN_TOKEN: ${{ secrets.KANBAN_TOKEN }}
          KANBAN_TEST_PROJECT: ${{ secrets.KANBAN_TEST_PROJECT }}
          KANBAN_TEST_REPO: ${{ secrets.KANBAN_TEST_REPO }}
          KANBAN_TEST_CARD_ITEM_ID: ${{ secrets.KANBAN_TEST_CARD_ITEM_ID }}
          KANBAN_TEST_INERT_COLUMN: ${{ secrets.KANBAN_TEST_INERT_COLUMN }}
