name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  # ── Stage 1: Fast checks (parallel) ───────────────────
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.13-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-3.13-
      - run: pip install ruff
      - run: ruff check personalscraper/ tests/
      - run: ruff format --check personalscraper/ tests/
      - run: python scripts/check_logging.py personalscraper/

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .mypy_cache
          key: pip-mypy-${{ runner.os }}-3.13-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-mypy-${{ runner.os }}-3.13-
      - run: pip install -e ".[dev]"
      - run: mypy personalscraper/

  secrets:
    name: secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          LATEST=$(curl -sSfL https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep -oP '"tag_name": "v\K[^"]+')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${LATEST}/gitleaks_${LATEST}_linux_x64.tar.gz" | tar xz
          sudo mv gitleaks /usr/local/bin/
      - name: Scan PR commits for secrets
        run: |
          gitleaks detect --source . --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" --verbose

  licenses:
    name: licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.13-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-3.13-
      - run: pip install -e . pip-licenses
      - run: pip-licenses --fail-on="GPL;GPL-2.0;GPL-3.0;GPL-2.0-only;GPL-3.0-only;GPL-2.0-or-later;GPL-3.0-or-later;GNU General Public License (GPL);GNU General Public License v2 (GPLv2);GNU General Public License v3 (GPLv3);GNU General Public License v2 or later (GPLv2+);GNU General Public License v3 or later (GPLv3+);AGPL;AGPL-3.0;AGPL-3.0-only;AGPL-3.0-or-later;GNU Affero General Public License v3;GNU Affero General Public License v3 or later (AGPLv3+);SSPL;SSPL-1.0;Server Side Public License"

  # ── Stage 2: Tests & security (depend on Stage 1) ─────
  test:
    name: test (${{ matrix.python-version }})${{ matrix.experimental && ' [experimental]' || '' }}
    runs-on: ubuntu-latest
    needs: [lint, typecheck, secrets, licenses]
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        experimental: [false]
        include:
          - python-version: "3.13"
            experimental: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-${{ matrix.python-version }}-
      - run: pip install -e ".[dev]"
      # ``make test-cov`` reads ``fail_under`` from pyproject.toml via
      # scripts/get_coverage_threshold.py, so the gate stays in lockstep with
      # the source-of-truth threshold and the local make target.
      - run: make test-cov
      - uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          # Forks cannot inherit secrets, so they always get a soft upload.
          # Internal PRs require a working CODECOV_TOKEN and fail otherwise.
          fail_ci_if_error: ${{ github.event.pull_request.head.repo.fork == false }}

  security:
    name: security
    runs-on: ubuntu-latest
    needs: [lint, typecheck, secrets, licenses]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.13-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-3.13-
      # Upgrade pip itself first — the runner ships pip 26.0.1 which carries
      # CVE-2026-6357 (fixed in 26.1). Auditing with the upgraded pip removes
      # the finding entirely instead of suppressing it.
      - run: python -m pip install --upgrade "pip>=26.1"
      - run: pip install -e . pip-audit
      # CVE-2026-3219 affects pip; no fix released yet. Ignore until upstream patch.
      # TODO(security): remove --ignore-vuln CVE-2026-3219 once pip ships a fix.
      #                 Check https://nvd.nist.gov/vuln/detail/CVE-2026-3219 for status.
      - run: pip-audit --ignore-vuln CVE-2026-3219

  coverage-monotonic:
    name: coverage-monotonic
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tomli for older Pythons
        run: pip install 'tomli; python_version < "3.11"'
      - name: Verify fail_under is monotonic against base ref
        env:
          BASE_REF: ${{ github.base_ref }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          set -euo pipefail
          head_threshold=$(python3 scripts/get_coverage_threshold.py)
          main_threshold=$(git show "origin/${BASE_REF}:pyproject.toml" | python3 scripts/get_coverage_threshold.py --stdin)
          echo "HEAD: ${head_threshold} | base (${BASE_REF}): ${main_threshold}"
          if [ "${head_threshold}" -lt "${main_threshold}" ]; then
            if echo ",${PR_LABELS}," | grep -q ',coverage-rollback,'; then
              echo "::warning::fail_under decreased (${main_threshold} → ${head_threshold}) — rollback acknowledged via label."
              exit 0
            fi
            echo "::error::fail_under decreased (${main_threshold} → ${head_threshold}). Add 'coverage-rollback' label to override."
            exit 1
          fi

  design-gaps:
    name: design-gaps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.12-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-3.12-
      - run: pip install -e ".[dev]"
      - name: Map freshness check
        run: python3 scripts/update_feature_map.py --check
      - name: Design coverage audit
        # Warning-mode through cycle 3. Promoted to a hard error in Phase 8
        # (cycle 4 — trailers) once contract-test coverage is broad enough.
        run: python3 scripts/audit_design_coverage.py
        continue-on-error: true
