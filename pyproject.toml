[build-system]
requires = ["setuptools>=65.5.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "personalscraper"
dynamic = ["version"]
description = "Media pipeline automation — ingest, sort, scrape, verify, dispatch."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [
    {name = "LounisBou", email = "LounisBou@users.noreply.github.com"}
]
keywords = ["media", "plex", "kodi", "nfo", "scraper", "automation", "pipeline"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Operating System :: MacOS",
    "Intended Audience :: End Users/Desktop",
    "Topic :: Multimedia :: Video",
    "Topic :: Utilities",
    "Environment :: Console",
]
dependencies = [
    "typer>=0.12.0",
    "pydantic-settings>=2.0",
    "python-dotenv>=1.0.0",
    "requests>=2.31.0",
    "qbittorrent-api>=2025.1.0",
    "guessit>=3.8.0",
    "rapidfuzz>=3.14.0",
    "tenacity>=9.1.0",
    "rich>=14.0.0",
    "structlog>=25.0.0",
    "json5>=0.9.14",
    "yt-dlp>=2026.1.1,<2027",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "ruff>=0.4.0",
    "mypy>=1.10.0",
    "types-requests>=2.31.0",
    "pip-audit>=2.7.0",
    "pip-licenses>=4.0.0",
]

[project.scripts]
personalscraper = "personalscraper.cli:app"

[tool.setuptools.dynamic]
version = {attr = "personalscraper.__version__"}

[tool.setuptools.packages.find]
include = ["personalscraper*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [".", "scripts"]
markers = [
    "e2e: End-to-end tests requiring storage disks and/or live APIs",
    "roundtrip: Roundtrip tests — torrentify disk media, re-match via API, compare",
    "e2e_torrent: Pipeline E2E with real torrent downloads (manual only, costs ratio)",
    "e2e_idempotence: E2E idempotence tests on real staging data (manual only)",
    "network: Network tests — opt-in via TRAILER_INTEGRATION_TESTS=1 env var",
]
addopts = "-m 'not e2e and not e2e_torrent and not e2e_idempotence and not network'"

[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "W", "D"]
ignore = ["D100", "D104"]  # D100=module docstring (enforced manually), D104=__init__ docstring

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.mypy]
python_version = "3.10"
strict = true
files = ["personalscraper"]
exclude = ["tests/"]

[[tool.mypy.overrides]]
module = ["guessit.*", "qbittorrent_api.*", "rapidfuzz.*", "yt_dlp.*"]
ignore_missing_imports = true

[tool.coverage.run]
source = ["personalscraper"]
omit = ["personalscraper/__main__.py"]

[tool.coverage.report]
fail_under = 80
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.",
]
