<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark light" />
    <!-- DS near-black --background (oklch(0.165 0.004 286) → #0e0e10). The PWA
         manifest <link> is injected by vite-plugin-pwa at build time. -->
    <meta name="theme-color" content="#0e0e10" />
    <link rel="icon" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>TorrentMate</title>
    <!-- On the staging host, swap ONLY the PWA icons + manifest to the cyan-liseret
         variant BEFORE install/paint. The NAME stays "TorrentMate" everywhere —
         prod and staging are told apart by the logo alone. Mirrors StagingBanner's
         host detection (src/lib/env.ts) and KanbanMate's approach. The manifest
         <link> is injected by vite-plugin-pwa; this runs after it in the head. -->
    <script>
      (function () {
        var h = location.hostname || "";
        if (!/staging/i.test(h) && location.port !== "8711") return;
        var setHref = function (sel, href) {
          var el = document.querySelector(sel);
          if (el) el.setAttribute("href", href);
        };
        var swap = function () {
          try {
            // The manifest <link> is injected by vite-plugin-pwa at the END of
            // <head>, AFTER this inline script — so it is not yet in the DOM on
            // the immediate pass. Re-run on DOMContentLoaded to catch it. The
            // static icon/apple links (above this script) swap immediately, so
            // the tab favicon reads STAGING pre-paint.
            setHref('link[rel="manifest"]', "/manifest-staging.webmanifest");
            setHref('link[rel="apple-touch-icon"]', "/apple-touch-icon-staging.png");
            setHref('link[rel="icon"]', "/icon-staging.svg");
          } catch (e) {
            /* detection best-effort — prod identity stays as the default */
          }
        };
        swap();
        document.addEventListener("DOMContentLoaded", swap);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
